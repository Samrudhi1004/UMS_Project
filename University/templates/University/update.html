<!DOCTYPE html>
<html>
<head>
    <title>Update University</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
    <style>
        .navbar {
            background-color: #007bff;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        .navbar-brand {
            color: white !important;
        }
    </style>
</head>

<body style="background-color:#f8f9fa; margin: 0;">


    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'Home' %}">UMS Project</a>
            <ul class="navbar-nav ms-3">
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'Home' %}">Home</a>
                </li>
            </ul>
            <div class="ml-auto">
                {% if user.is_authenticated %}
                    <span class="navbar-text mr-2">Welcome, {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="margin-top: 100px !important;">

        <h1 class="text-center text-primary mb-4">Update University : {{ data.u_name }}</h1>

        <form action="{% url 'universities:update_university' data.id %}" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>University ID</label>
                <input type="text" name="id" value="{{ data.id }}" class="form-control" disabled>
            </div>

            <div class="form-group">
                <label>University Name</label>
                <input type="text" name="u_name" value="{{ data.u_name }}" class="form-control">
            </div>

            <div class="form-group">
                <label>University Code</label>
                <input type="text" name="u_code" value="{{ data.u_code }}" class="form-control">
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="u_city" value="{{ data.u_city }}" class="form-control">
            </div>

            <div class="form-group">
                <label>State</label>
                <input type="text" name="u_state" value="{{ data.u_state }}" class="form-control">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="u_email" value="{{ data.u_email }}" class="form-control">
            </div>

            <div class="form-group">
                <label>Contact</label>
                <input type="text" name="u_contact" value="{{ data.u_contact }}" class="form-control">
            </div>

            <button type="submit" class="btn btn-success">UPDATE</button>
        </form>

    </div>
</body>
</html>
