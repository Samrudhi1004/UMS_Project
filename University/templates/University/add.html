<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insert University</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eef2ff, #f8fafc);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .form-card {
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 35px 30px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-top: 80px; /* Add top margin for navbar */
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 25px;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
        }

        .form-control {
            border-radius: 10px;
            padding: 10px;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 0.2rem rgba(37,99,235,0.2);
        }

        .btn-submit {
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            background: #16a34a;
            border: none;
            color: white;
        }

        .btn-submit:hover {
            background: #15803d;
            transform: translateY(-2px);
        }

        .btn-back {
            width: 100%;
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
        }
        .navbar {
            background-color: #007bff;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        .navbar-brand {
            color: white !important;
        }
    </style>
</head>

<body>


    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'Home' %}">UMS Project</a>
            <ul class="navbar-nav ms-3">
                <li class="nav-item">
                    <a class="nav-link text-white" href="{% url 'Home' %}">Home</a>
                </li>
            </ul>
            <div class="ml-auto">
                {% if user.is_authenticated %}
                    <span class="navbar-text mr-2">Welcome, {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

<div class="form-card">

    <div class="title">🏫 Insert University</div>

    <form action="{% url 'universities:add_university' %}" method="POST">
    {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">University Name</label>
            <input type="text" name="u_name" id="u_name" class="form-control"  pattern="[A-Za-z\s\-']+"
            title="University name should contain only letters, spaces, hyphens, and apostrophes."
           required>
            <div id="name-error" class="text-danger mt-1" style="display: none;"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">University Code</label>
            <input type="text" name="u_code" id="u_code" class="form-control" pattern="[A-Za-z0-9]+"
            title="University code should contain only letters and numbers."
            required>
            <div id="code-error" class="text-danger mt-1" style="display: none;"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">City</label>
            <input type="text" name="u_city" id="u_city" class="form-control" pattern="[A-Za-z\s]+"
            title="City should contain only letters and spaces."
            required>
            <div id="city-error" class="text-danger mt-1" style="display: none;"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">State</label>
            <input type="text" name="u_state" id="u_state" class="form-control" pattern="[A-Za-z\s]+"
            title="State should contain only letters and spaces."
            required>
            <div id="state-error" class="text-danger mt-1" style="display: none;"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Official Email</label>
            <input type="email" name="u_email" id="u_email" class="form-control" required>
            <div id="email-error" class="text-danger mt-1" style="display: none;"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="text" name="u_contact" id="u_contact" class="form-control"  pattern="[0-9]+"
            title="Enter valid contact number: numbers only."
            required>
            <div id="contact-error" class="text-danger mt-1" style="display: none;"></div>
        </div>

        <button type="submit" class="btn btn-submit">Submit</button>
    </form>

</div>


</body>
</html>
